name: EAS Release Android (Weekly)

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (aguarda conclusao)
        id: eas-build
        run: |
          OUTPUT=$(npx eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json 2>/dev/null)
          echo "apk_url=$(echo "$OUTPUT" | jq -r '.[0].artifacts.applicationArchiveUrl')" \
            >> $GITHUB_OUTPUT
          echo "build_id=$(echo "$OUTPUT" | jq -r '.[0].id')" \
            >> $GITHUB_OUTPUT
          echo "app_version=$(echo "$OUTPUT" | jq -r '.[0].appVersion')" \
            >> $GITHUB_OUTPUT

      - name: Criar GitHub Release
        env:
          APK_URL: ${{ steps.eas-build.outputs.apk_url }}
          BUILD_ID: ${{ steps.eas-build.outputs.build_id }}
          APP_VERSION: ${{ steps.eas-build.outputs.app_version }}
          GH_SHA: ${{ github.sha }}
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const shortSha = process.env.GH_SHA.substring(0, 7);
            const tagName = `android-preview-${date}-${shortSha}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Android Preview ${date} (v${process.env.APP_VERSION})`,
              body: [
                '## Android Preview Build',
                '',
                `- **Data:** ${date}`,
                `- **Versao:** ${process.env.APP_VERSION}`,
                `- **Commit:** \`${shortSha}\``,
                `- **APK (arm64):** [Download direto](${process.env.APK_URL})`,
                `- **[Ver build no Expo](https://expo.dev/accounts/notgreatdavi/projects/mandaca-frontend/builds/${process.env.BUILD_ID})**`,
                '',
                '> Build gerado automaticamente a partir da branch `main`.',
                '> Instale apenas em dispositivos Android (arm64-v8a).',
              ].join('\n'),
              prerelease: true,
              make_latest: 'false',
            });
