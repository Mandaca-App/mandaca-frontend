name: CI - Build & Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint (Style Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check line length (max 100 chars)
        run: |
          echo "Checking for lines exceeding 100 characters..."
          FAILED=0
          while IFS= read -r -d '' file; do
            while IFS= read -r line || [[ -n "$line" ]]; do
              len=${#line}
              if [ "$len" -gt 100 ]; then
                echo "ERROR: Line too long ($len chars) in $file"
                FAILED=1
              fi
            done < "$file"
          done < <(find . \
            -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.expo/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            ! -path "*/scripts/*" \
            ! -path "*/constants/theme.ts/* \
            -print0)
          if [ "$FAILED" -eq 1 ]; then
            echo "Lint failed: one or more lines exceed 100 characters."
            exit 1
          fi
          echo "All lines are within the 100 character limit."

  build:
    name: Build (Compilation Check)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Expo export (web build check)
        run: npx expo export --platform web
        env:
          CI: true